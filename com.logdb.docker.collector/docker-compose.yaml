version: "3.8"

services:
  logdb-docker-collector:
    image: logdb/docker-collector:0.1
    container_name: logdb-docker-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logdb-collector:/var/lib/logdb-collector
    environment:
      - LOGDB_EXPORTER_ENDPOINT=http://grpc-logger:8080
      - LOGDB_EXPORTER_APIKEY=your-api-key-here
      # Optional overrides:
      # - LOGDB_EXPORTER_ENABLED=true             # default: true in Docker env
      # - LOGDB_EXPORTER_MAX_RETRIES=3             # default: 3
      # - LOGDB_EXPORTER_TIMEOUT=30                # default: 30 seconds
      # - LOGDB_SPOOL_MAX_DISK_MB=100              # default: 100 MB
      # - LOGDB_DISCOVERY_INTERVAL=30              # default: 30 seconds
      # - LOGDB_CHECKPOINT_FLUSH_INTERVAL=15       # default: 15 seconds
    networks:
      - backend

  logdb-docker-collector-ui:
    image: logdb/docker-collector-ui:0.1
    container_name: logdb-docker-collector-ui
    restart: unless-stopped
    ports:
      - "5010:8080"
    environment:
      - COLLECTOR_API_URL=http://logdb-docker-collector:8080
    networks:
      - backend

networks:
  backend:
    external: true
    name: logdb-net

volumes:
  logdb-collector:
