services:
  logdb-docker-collector:
    image: logdb/docker-collector:latest
    container_name: logdb-docker-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Docker container logs.
      # Check your install with: docker info | grep "Docker Root Dir"
      # IMPORTANT: source and destination MUST be the same path. Docker's inspect
      # API returns the host LogPath verbatim, so the collector looks for that
      # exact path inside its own filesystem. Bind-mount it at the same location.
      #
      # Uncomment ONE of the following based on your host's Docker install:
      #
      # Standard install (apt/deb/rpm):
      # - /var/lib/docker/containers:/var/lib/docker/containers:ro
      #
      # Snap install:
      - /var/snap/docker/common/var-lib-docker/containers:/var/snap/docker/common/var-lib-docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logdb-collector:/var/lib/logdb-collector
    environment:
      - LOGDB_EXPORTER_APIKEY=your-api-key-here
      # Optional overrides:
      # - LOGDB_EXPORTER_ENABLED=true             # default: true in Docker env
      # - LOGDB_EXPORTER_MAX_RETRIES=3             # default: 3
      # - LOGDB_EXPORTER_TIMEOUT=30                # default: 30 seconds
      # - LOGDB_SPOOL_MAX_DISK_MB=100              # default: 100 MB
      # - LOGDB_DISCOVERY_INTERVAL=30              # default: 30 seconds
      # - LOGDB_CHECKPOINT_FLUSH_INTERVAL=15       # default: 15 seconds
    networks:
      - backend

  logdb-docker-collector-ui:
    image: logdb/docker-collector-ui:latest
    container_name: logdb-docker-collector-ui
    restart: unless-stopped
    ports:
      - "5010:8080"
    environment:
      - COLLECTOR_API_URL=http://logdb-docker-collector:8080
      # Sub-path under which the UI is served, must match the nginx location prefix.
      # Leave unset to serve at "/".
      - PathBase=/docker-collector
    networks:
      - backend

networks:
  backend:
    name: logdb-net

volumes:
  logdb-collector:
