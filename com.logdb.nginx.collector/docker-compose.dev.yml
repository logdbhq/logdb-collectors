# Local development stack for LogDB Nginx Collector
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# This creates:
#   - nginx:         Generates realistic access/error logs
#   - collector:     Tails, parses, spools nginx logs
#   - collector-ui:  Operator dashboard at http://localhost:8081
#
# Nginx logs are written to a shared volume that the collector reads.
# The collector runs with exporter disabled (spool-only mode) so no
# real LogDB endpoint is needed for local dev.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - nginx-logs:/var/log/nginx
      - ./dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dev/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - nginx-logs:/var/log/nginx:ro
      - collector-data:/var/lib/logdb-nginx-collector
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      # Exporter disabled for local dev (no real LogDB endpoint)
      - LOGDB_EXPORTER_ENABLED=false
    depends_on:
      nginx:
        condition: service_healthy

  collector-ui:
    build:
      context: ../com.logdb.nginx.collector.ui
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - COLLECTOR_API_URL=http://collector:8080
    depends_on:
      - collector

  # Optional: generate traffic to nginx so logs flow continuously
  traffic-gen:
    image: alpine:latest
    depends_on:
      nginx:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c '
      apk add --no-cache curl > /dev/null 2>&1;
      echo "Traffic generator started";
      while true; do
        curl -s http://nginx/ > /dev/null;
        curl -s http://nginx/health > /dev/null;
        curl -s http://nginx/api/data > /dev/null;
        curl -s http://nginx/missing-page > /dev/null 2>&1;
        curl -s -X POST http://nginx/api/submit -d "test=1" > /dev/null;
        sleep 2;
      done
      '

volumes:
  nginx-logs:
  collector-data:
