# LogDB Nginx Collector compose file.
#
# Quick start:
#   1. Set LOGDB_EXPORTER_ENDPOINT and LOGDB_EXPORTER_APIKEY below
#   2. Adjust the Nginx log volume path to match your host
#   3. Run: docker compose up -d
#
# Ports (host:container):
#   18080:8080  Collector API + health check
#   18081:8081  Operator dashboard
#
# Health check:
#   curl http://localhost:18080/health/ready

services:
  logdb-nginx-collector:
    image: logdb/nginx-collector:latest
    restart: unless-stopped
    ports:
      - "18080:8080"   # API + health
      - "18081:8081"   # Operator UI
    volumes:
      # Mount your Nginx log directory (read-only)
      - /var/log/nginx:/var/log/nginx:ro
      # Persistent storage for checkpoints and spool
      - collector-data:/var/lib/logdb-nginx-collector
    environment:
      # Required
      - LOGDB_EXPORTER_ENABLED=true
      - LOGDB_EXPORTER_ENDPOINT=https://your-logdb-instance.example.com
      - LOGDB_EXPORTER_APIKEY=your-api-key-here

      # Operator-console authentication (the UI is publicly reachable on :18081).
      # Leave LOGDB_UI_PASSWORD unset to disable the login gate (NOT recommended).
      # LOGDB_API_KEY protects the backend API and is also forwarded by the UI; the
      # same value must be set for both the API and UI processes (one container here,
      # so it is shared automatically). Always serve this behind an HTTPS proxy.
      - LOGDB_UI_USERNAME=admin
      - LOGDB_UI_PASSWORD=change-me-please
      - LOGDB_API_KEY=generate-a-long-random-key

      # Mount the operator UI under this path prefix (matches the nginx reverse
      # proxy location block at /nginx-collector/). Leave unset to serve at /.
      - PathBase=/nginx-collector

      # Optional overrides
      # - LOGDB_EXPORTER_PROTOCOL=Native          # Native (gRPC) or REST
      # - LOGDB_EXPORTER_COMPRESSION=true
      # - LOGDB_EXPORTER_MAX_RETRIES=3
      # - LOGDB_EXPORTER_TIMEOUT=30
      # - LOGDB_SPOOL_MAX_DISK_MB=100
      # - LOGDB_CHECKPOINT_FLUSH_INTERVAL=15

volumes:
  collector-data:
