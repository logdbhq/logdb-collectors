server {
    listen 80;
    server_name localhost;

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"hello from nginx dev"}';
        add_header Content-Type application/json;
    }

    location /api/data {
        return 200 '{"data":[1,2,3]}';
        add_header Content-Type application/json;
    }

    location /api/submit {
        if ($request_method != POST) {
            return 405;
        }
        return 201 '{"created":true}';
        add_header Content-Type application/json;
    }

    # This will generate 404 errors in the access log
    location /missing-page {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
